<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Upload Event</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dash">

    <div class="dashboard-container">
        <header class="dash-header">
            <h2>Dashboard Admin</h2>
            <a href="index.html" class="btn-back">Kembali ke Web</a>
        </header>

        <main class="dash-content">
            <div class="upload-box">
                <h3>Tambah Foto Event Baru</h3>
                <form id="uploadForm">
                    <label>Nama/Judul Event</label>
                    <input type="text" id="eventTitle" placeholder="Contoh: Konser Band Indie" required>

                    <label>Link Foto (URL) / Pilih File</label>
                    <input type="text" id="eventImg" placeholder="Masukkan URL Gambar (sementara)" required>
                    
                    <button type="submit" class="btn-submit">Simpan & Publikasikan</button>
                </form>
            </div>
        </main>
    </div>

   <script>
        const uploadForm = document.getElementById('uploadForm');

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah halaman refresh saat submit
            
            const title = document.getElementById('eventTitle').value;
            const imgUrl = document.getElementById('eventImg').value;

            // 1. Ambil data lama dari LocalStorage (jika ada), jika belum ada buat array kosong
            let currentEvents = localStorage.getItem('eventGallery');
            if (currentEvents) {
                currentEvents = JSON.parse(currentEvents);
            } else {
                currentEvents = [];
            }

            // 2. Tambahkan data event baru ke dalam array
            currentEvents.push({
                title: title,
                img: imgUrl
            });

            // 3. Simpan kembali array yang diperbarui ke LocalStorage
            localStorage.setItem('eventGallery', JSON.stringify(currentEvents));
            
            // 4. Beri notifikasi sukses dan reset form
            alert('Foto event "' + title + '" berhasil diterbitkan ke halaman utama!');
            uploadForm.reset();
        });
    </script>
</body>
</html>
